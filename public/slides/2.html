<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>PART 1 - 전략적 비전 및 목표</title>
<script src="https://picture-search.skywork.ai/aippt/static/tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.2.0/css/all.min.css">
<style>
@import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;600;700&display=swap");
:root {
  --ppt-bg: #0A0E1A;
  --ppt-bg-soft: #141B2D;
  --ppt-surface: #1E2638;
  --ppt-surface-2: #2A344A;
  --ppt-border: #334155;
  --ppt-text-1: #FFF;
  --ppt-text-2: #94A3B8;
  --ppt-text-3: #64748B;
  --ppt-accent: #00F0FF;
  --ppt-accent-2: #FACC15;
  --ppt-font: "IBM Plex Sans KR", sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 960px; height: 720px; overflow: hidden;
  background-color: #000; display: flex;
  justify-content: center; align-items: center;
}
.section-slide-root {
  width: 960px; height: 720px;
  background-color: var(--ppt-bg);
  font-family: var(--ppt-font);
  position: relative; display: flex;
  flex-direction: column;
  justify-content: center; align-items: flex-start;
  padding: 0 80px;
  overflow: hidden;
}
/* Background decorative elements */
.bg-grid-overlay {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}
.bg-glow-circle {
  position: absolute; right: -120px; top: 50%;
  transform: translateY(-50%);
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(0,240,255,0.07) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}
.bg-left-bar {
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 6px;
  background: linear-gradient(180deg, transparent 0%, var(--ppt-accent) 40%, var(--ppt-accent) 60%, transparent 100%);
}
/* Content */
.section-part-label {
  font-size: 14px; font-weight: 700;
  color: var(--ppt-accent);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 12px;
}
.section-part-label::after {
  content: '';
  display: block; width: 60px; height: 1px;
  background: var(--ppt-accent); opacity: 0.5;
}
.section-part-number {
  font-size: 120px; font-weight: 700;
  line-height: 1;
  color: transparent;
  -webkit-text-stroke: 1px rgba(0,240,255,0.2);
  position: absolute; right: 60px; bottom: 40px;
  user-select: none;
}
.section-title-ko {
  font-size: 48px; font-weight: 700;
  color: var(--ppt-text-1);
  line-height: 1.2;
  margin-bottom: 8px;
}
.section-title-en {
  font-size: 18px; font-weight: 400;
  color: var(--ppt-accent-2);
  letter-spacing: 1px;
  margin-bottom: 40px;
}
.section-divider-line {
  width: 80px; height: 3px;
  background: linear-gradient(90deg, var(--ppt-accent), transparent);
  margin-bottom: 36px;
  border-radius: 2px;
}
.section-topics-list {
  display: flex; flex-direction: column; gap: 14px;
}
.section-topic-item {
  display: flex; align-items: center; gap: 14px;
}
.topic-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--ppt-accent); flex-shrink: 0;
  box-shadow: 0 0 8px var(--ppt-accent);
}
.topic-text {
  font-size: 17px; color: var(--ppt-text-2);
  font-weight: 400; line-height: 1.4;
}
html { overflow: hidden; }
</style></head>
<body>
<div class="section-slide-root">
  <div class="bg-grid-overlay"></div>
  <div class="bg-glow-circle"></div>
  <div class="bg-left-bar"></div>
  <div class="section-part-number">01</div>
  <div class="section-part-label">PART 01</div>
  <div class="section-title-ko">전략적 비전 및 목표</div>
  <div class="section-title-en">Strategic Vision &amp; Objectives</div>
  <div class="section-divider-line"></div>
  <div class="section-topics-list">
    <div class="section-topic-item">
      <div class="topic-dot"></div>
      <span class="topic-text">FaSS 플랫폼 아이덴티티 — Faster · Agile · Smarter · Stronger 비전 및 로고</span>
    </div>
    <div class="section-topic-item">
      <div class="topic-dot"></div>
      <span class="topic-text">Executive Summary — 프로젝트 종합 요약 및 중장기 전략 로드맵 (2026.06 ~ 2027.H2)</span>
    </div>
  </div>
</div>
</body>
</html>
