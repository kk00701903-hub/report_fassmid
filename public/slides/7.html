<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>PART 2 - 프로젝트 진행 경과 및 방향성</title>
<script src="https://picture-search.skywork.ai/aippt/static/tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.2.0/css/all.min.css">
<link rel="stylesheet" href="shared/slide-fonts.css">
<link rel="stylesheet" href="shared/slide-motion.css">
<style>
@import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;600;700&display=swap");
:root {
  --ppt-font-body: "IBM Plex Sans KR", sans-serif;
  --ppt-font-display: "IBM Plex Sans KR", sans-serif;

  --ppt-bg: #0A0E1A;
  --ppt-bg-soft: #141B2D;
  --ppt-surface: #1E2638;
  --ppt-surface-2: #2A344A;
  --ppt-border: #334155;
  --ppt-text-1: #FFF;
  --ppt-text-2: #94A3B8;
  --ppt-text-3: #64748B;
  --ppt-accent: #00F0FF;
  --ppt-accent-2: #FACC15;
  --ppt-font: "IBM Plex Sans KR", sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body{
  width:100vw; height:100vh; overflow: hidden;
  background-color:#0A0E1A; display: flex;
  justify-content: center; align-items: center;
;font-family:var(--ppt-font-body,var(--ppt-font))}
.section-slide-root {
  width: 960px; height: 720px;
  background-color: var(--ppt-bg);
  font-family: var(--ppt-font);
  position: relative; display: flex;
  flex-direction: column;
  justify-content: center; align-items: flex-start;
  padding: 0 80px;
  overflow: hidden;
}
.bg-grid-overlay {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}
.bg-glow-circle {
  position: absolute; right: -120px; top: 50%;
  transform: translateY(-50%);
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(250,204,21,0.06) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}
.bg-left-bar {
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 6px;
  background: linear-gradient(180deg, transparent 0%, var(--ppt-accent-2) 40%, var(--ppt-accent-2) 60%, transparent 100%);
}
.section-part-number {
  font-size: 120px; font-weight: 700;
  line-height: 1;
  color: transparent;
  -webkit-text-stroke: 1px rgba(250,204,21,0.15);
  position: absolute; right: 60px; bottom: 40px;
  user-select: none;
}
.section-part-label {
  font-size: 14px; font-weight: 700;
  color: var(--ppt-accent-2);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 12px;
}
.section-part-label::after {
  content: '';
  display: block; width: 60px; height: 1px;
  background: var(--ppt-accent-2); opacity: 0.5;
}
.section-title-ko {
  font-size:26px; font-weight: 700;
  color: var(--ppt-text-1);
  line-height: 1.2;
  margin-bottom: 8px;
}
.section-title-en {
  font-size: 18px; font-weight: 400;
  color: var(--ppt-accent);
  letter-spacing: 1px;
  margin-bottom: 40px;
}
.section-divider-line {
  width: 80px; height: 3px;
  background: linear-gradient(90deg, var(--ppt-accent-2), transparent);
  margin-bottom: 36px;
  border-radius: 2px;
}
.section-topics-list {
  display: flex; flex-direction: column; gap: 14px;
}
.section-topic-item {
  display: flex; align-items: center; gap: 14px;
}
.topic-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--ppt-accent-2); flex-shrink: 0;
  box-shadow: 0 0 8px var(--ppt-accent-2);
}
.topic-text {
  font-size: 17px; color: var(--ppt-text-2);
  font-weight: 400; line-height: 1.4;
}
html { overflow: hidden;  margin:0; padding:0; }
</style></head>
<body>
<div class="section-slide-root" data-motion="part">
  <div class="bg-grid-overlay"></div>
  <div class="bg-glow-circle"></div>
  <div class="bg-left-bar"></div>
  <div class="section-part-number">02</div>
  <div class="section-part-label">PART 02</div>
  <div class="section-title-ko">프로젝트 진행 경과 및 방향성</div>
  <div class="section-title-en">Project Progress &amp; Direction</div>
  <div class="section-divider-line"></div>
  <div class="section-topics-list">
    <div class="section-topic-item">
      <div class="topic-dot"></div>
      <span class="topic-text">AI-Augmented 개발 워크플로우</span>
    </div>
    <div class="section-topic-item">
      <div class="topic-dot"></div>
      <span class="topic-text">프로젝트 진행경과 마일스톤</span>
    </div>
    <div class="section-topic-item">
      <div class="topic-dot"></div>
      <span class="topic-text">최적화 방안 1. AI 디지털 워커 활용</span>
    </div>
    <div class="section-topic-item">
      <div class="topic-dot"></div>
      <span class="topic-text">최적화 방안 2. 애자일 워룸 운영</span>
    </div>
    <div class="section-topic-item">
      <div class="topic-dot"></div>
      <span class="topic-text">최적화 방안 3. 사전 POC 운영</span>
    </div>
  </div>
</div>
<script>
(function(){
  function applyScale(){
    var el=document.querySelector('body>div');
    if(!el)return;
    var sw=window.innerWidth,sh=window.innerHeight;
    var scale=Math.min(sw/960,sh/720);
    el.style.transform='scale('+scale+')';
    el.style.transformOrigin='top left';
    el.style.position='absolute';
    el.style.left=Math.round((sw-960*scale)/2)+'px';
    el.style.top=Math.round((sh-720*scale)/2)+'px';
  }
  applyScale();
  window.addEventListener('resize',applyScale);
})();
</script>
</body>
</html>
