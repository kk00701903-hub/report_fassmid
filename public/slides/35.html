<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>(주)제때 차세대 FaSS 플랫폼 구축 6월 중간 보고 - 맺음말</title>
<script src="https://picture-search.skywork.ai/aippt/static/tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.2.0/css/all.min.css">
<style>
@import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;600;700&display=swap");
:root {
  --ppt-bg: #0A0E1A;
  --ppt-bg-soft: #141B2D;
  --ppt-surface: #1E2638;
  --ppt-surface-2: #2A344A;
  --ppt-border: #334155;
  --ppt-text-1: #FFF;
  --ppt-text-2: #94A3B8;
  --ppt-text-3: #64748B;
  --ppt-accent: #00F0FF;
  --ppt-accent-2: #FACC15;
  --ppt-good: #22C55E;
  --ppt-radius-sm: 4px;
  --ppt-radius-md: 8px;
  --ppt-radius-lg: 16px;
  --ppt-shadow-soft: 0 4px 12px rgba(0,0,0,0.3);
  --ppt-font-display: "IBM Plex Sans KR", sans-serif;
  --ppt-font-body: "IBM Plex Sans KR", sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width:100vw; height:100vh; overflow: hidden;
  background-color:#0A0E1A;
  display: flex; justify-content: center; align-items: center;
  font-family: var(--ppt-font-body);
}
.slide-root {
  width: 960px; height: 720px;
  background-color: var(--ppt-bg);
  color: var(--ppt-text-1);
  position: relative;
  display: flex; flex-direction: column;
  border: 1px solid var(--ppt-border);
  overflow: hidden;
}
/* Glow effects */
.slide-root::before {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  background: radial-gradient(ellipse at 10% 10%, rgba(0,240,255,0.06) 0%, transparent 55%);
  pointer-events: none;
}
.slide-root::after {
  content: '';
  position: absolute; bottom: 0; right: 0;
  width: 100%; height: 100%;
  background: radial-gradient(ellipse at 90% 90%, rgba(250,204,21,0.05) 0%, transparent 55%);
  pointer-events: none;
}
/* Title */
.title-region {
  padding: 22px 40px 10px 40px;
  display: flex; flex-direction: column; gap: 4px;
}
.title-header { display: flex; align-items: center; gap: 12px; }
.title-bar { width: 4px; height: 32px; background: var(--ppt-accent-2); border-radius: 2px; }
.title-text {
  font-family: var(--ppt-font-display);
  font-size: 32px; font-weight: 700; color: var(--ppt-text-1); margin: 0;
}
.title-line {
  height: 1px; width: 100%;
  background: linear-gradient(90deg, var(--ppt-accent-2) 0%, transparent 100%);
  opacity: 0.3; margin-top: 4px;
}
/* Main body */
.main-body {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  padding: 8px 40px 12px 40px;
  display: flex;
  align-items: stretch;
}
/* Left: quote + commitment */
.left-col {
  flex: 1;
  display: flex; flex-direction: column;
  justify-content: center; gap: 12px;
}
.quote-box {
  background: var(--ppt-bg-soft);
  border-left: 4px solid var(--ppt-accent-2);
  border-radius: var(--ppt-radius-md);
  padding: 14px 18px;
}
.quote-icon {
  font-size: 22px; color: var(--ppt-accent-2);
  margin-bottom: 8px; display: block;
}
.quote-text {
  font-size: 16px; font-weight: 700;
  color: var(--ppt-text-1);
  line-height: 1.45; font-style: italic;
}
.quote-text span { color: var(--ppt-accent-2); }
.quote-sub {
  margin-top: 8px;
  font-size: 14px; color: var(--ppt-text-2);
  line-height: 1.4;
}
.commitment-box {
  display: flex; flex-direction: column; gap: 8px;
}
.commitment-row {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 8px 12px;
  background: var(--ppt-surface);
  border-radius: var(--ppt-radius-md);
  border: 1px solid var(--ppt-border);
}
.commitment-icon { color: var(--ppt-good); font-size: 16px; flex-shrink: 0; }
.commitment-text { font-size: 14px; color: var(--ppt-text-2); line-height: 1.35; }
.commitment-text strong { color: var(--ppt-text-1); }
html { overflow: hidden;  margin:0; padding:0; }
</style></head>
<body>
<div class="slide-root">
  <!-- Title -->
  <div class="title-region">
    <div class="title-header">
      <div class="title-bar"></div>
      <h1 class="title-text">맺음말</h1>
    </div>
    <div class="title-line"></div>
  </div>

  <div class="main-body">
    <!-- Left -->
    <div class="left-col">
      <div class="quote-box">
        <i class="fas fa-quote-left quote-icon"></i>
        <div class="quote-text">
          "기술 내재화를 넘어,<br/>
          <span>(주)제때의 미래 수익을 코딩합니다.</span>"
        </div>
        <div class="quote-sub">
          TFT 전원은 대표이사님의 비즈니스 혁신 비전을 현실로 구현하겠습니다.
        </div>
      </div>
      <div class="commitment-box">
        <div class="commitment-row">
          <i class="fas fa-check-circle commitment-icon"></i>
          <div class="commitment-text"><strong>기술 자산화:</strong> 자체 프레임워크로 SI 비용 80억 방어 및 100억+ 기술 자산 내재화</div>
        </div>
        <div class="commitment-row">
          <i class="fas fa-check-circle commitment-icon"></i>
          <div class="commitment-text"><strong>수익·미래:</strong> ASP 수익 파이프라인 전환 및 AI 디지털 워커 조직 진화</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
(function(){
  function applyScale(){
    var el=document.querySelector('body>div');
    if(!el)return;
    var sw=window.innerWidth,sh=window.innerHeight;
    var scale=Math.min(sw/960,sh/720);
    el.style.transform='scale('+scale+')';
    el.style.transformOrigin='top left';
    el.style.position='absolute';
    el.style.left=Math.round((sw-960*scale)/2)+'px';
    el.style.top=Math.round((sh-720*scale)/2)+'px';
  }
  applyScale();
  window.addEventListener('resize',applyScale);
})();
</script>
</body>
</html>
