<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>PART 2 - 프로젝트 진행 경과 및 성과</title>
<script src="https://picture-search.skywork.ai/aippt/static/tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.2.0/css/all.min.css">
<style>
@import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;600;700&display=swap");
:root {
  --ppt-bg: #0A0E1A;
  --ppt-bg-soft: #141B2D;
  --ppt-surface: #1E2638;
  --ppt-surface-2: #2A344A;
  --ppt-border: #334155;
  --ppt-text-1: #FFF;
  --ppt-text-2: #94A3B8;
  --ppt-text-3: #64748B;
  --ppt-accent: #00F0FF;
  --ppt-accent-2: #FACC15;
  --ppt-font: "IBM Plex Sans KR", sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 960px; height: 720px; overflow: hidden;
  background-color: var(--ppt-bg);
}
.section-slide-root {
  width: 960px; height: 720px;
  background-color: var(--ppt-bg);
  font-family: var(--ppt-font);
  position: relative; display: flex;
  flex-direction: column;
  justify-content: center; align-items: flex-start;
  padding: 0 80px;
  overflow: hidden;
}
.bg-grid-overlay {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}
.bg-glow-circle {
  position: absolute; right: -120px; top: 50%;
  transform: translateY(-50%);
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(250,204,21,0.06) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}
.bg-left-bar {
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 6px;
  background: linear-gradient(180deg, transparent 0%, var(--ppt-accent-2) 40%, var(--ppt-accent-2) 60%, transparent 100%);
}
.section-part-number {
  font-size: 120px; font-weight: 700;
  line-height: 1;
  color: transparent;
  -webkit-text-stroke: 1px rgba(250,204,21,0.15);
  position: absolute; right: 60px; bottom: 40px;
  user-select: none;
}
.section-part-label {
  font-size: 14px; font-weight: 700;
  color: var(--ppt-accent-2);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 12px;
}
.section-part-label::after {
  content: '';
  display: block; width: 60px; height: 1px;
  background: var(--ppt-accent-2); opacity: 0.5;
}
.section-title-ko {
  font-size: 48px; font-weight: 700;
  color: var(--ppt-text-1);
  line-height: 1.2;
  margin-bottom: 8px;
}
.section-title-en {
  font-size: 18px; font-weight: 400;
  color: var(--ppt-accent);
  letter-spacing: 1px;
  margin-bottom: 40px;
}
.section-divider-line {
  width: 80px; height: 3px;
  background: linear-gradient(90deg, var(--ppt-accent-2), transparent);
  margin-bottom: 36px;
  border-radius: 2px;
}
.section-topics-list {
  display: flex; flex-direction: column; gap: 14px;
}
.section-topic-item {
  display: flex; align-items: center; gap: 14px;
}
.topic-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--ppt-accent-2); flex-shrink: 0;
  box-shadow: 0 0 8px var(--ppt-accent-2);
}
.topic-text {
  font-size: 17px; color: var(--ppt-text-2);
  font-weight: 400; line-height: 1.4;
}
html { overflow: hidden; }
</style></head>
<body>
<div class="section-slide-root">
  <div class="bg-grid-overlay"></div>
  <div class="bg-glow-circle"></div>
  <div class="bg-left-bar"></div>
  <div class="section-part-number">02</div>
  <div class="section-part-label">PART 02</div>
  <div class="section-title-ko">프로젝트 진행 경과 및 성과</div>
  <div class="section-title-en">Project Progress &amp; Achievements</div>
  <div class="section-divider-line"></div>
  <div class="section-topics-list">
    <div class="section-topic-item">
      <div class="topic-dot"></div>
      <span class="topic-text">주요 마일스톤 — 프로젝트 착수부터 현재(6월)까지 주요 진행 상황</span>
    </div>
    <div class="section-topic-item">
      <div class="topic-dot"></div>
      <span class="topic-text">인프라 기반 구축 — Java 21, React, Next.js 표준 아키텍처 및 개발 환경 구성 완료</span>
    </div>
    <div class="section-topic-item">
      <div class="topic-dot"></div>
      <span class="topic-text">조직 운영 성과 — 애자일 워룸(War-Room) 구축 및 기획·개발 일체형 환경 운영 현황</span>
    </div>
    <div class="section-topic-item">
      <div class="topic-dot"></div>
      <span class="topic-text">기술 자산화 — 레거시 분석 데이터 확보 및 AI 에이전트 개발 환경 구축 완료</span>
    </div>
  </div>
</div>
</body>
</html>
